name: SWFO-L1 Automated Intercept

on:
  schedule:
    - cron: '*/5 * * * *' # 5-minute capture

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fetch Raw Bytes
        run: |
          python3 scripts/swfo_l1_direct_ingest.py
          python3 scripts/swfo_l1_positioning_harvester.py  # <--- THIS IS THE ADDITION
      - name: Auto-Action to Repo
        run: |
          git config user.name "LUFT L1 Master"
          git add data/swfo_l1_telemetry/
          git commit -m "data: Raw L1 ingest + attitude [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push
