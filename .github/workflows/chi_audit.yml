name: Imperial Chi Data Interrogator

# This tells the server to run every time you push code, or manually from the Actions tab.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-math-audit:
    runs-on: ubuntu-latest

    steps:
    # 1. Grab your repository files (Updated to v4)
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up the Python environment (Updated to v5)
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install the required math and graphing libraries
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy matplotlib

    # 4. Execute the Chi Interrogator
    - name: Run Substrate Braking Interrogation
      run: |
        python chi_mach_interrogator.py

    # 5. Upload the results (FIXED: Updated to v4 to bypass the deprecation block)
    - name: Archive Diagnostic Outputs
      uses: actions/upload-artifact@v4
      with:
        name: Chi_Math_Diagnostics
        path: diagnostic_outputs/
