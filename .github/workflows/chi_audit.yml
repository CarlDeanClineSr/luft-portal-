name: Imperial Chi Data Interrogator

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-math-audit:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up Python
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy matplotlib scipy

    # 4. Run Chi Mach Interrogator
    #    Uses continue-on-error so a missing data file does not
    #    block the mass audit from running.
    - name: Run Chi Mach Interrogator
      continue-on-error: true
      run: python chi_mach_interrogator.py

    # 5. Run Mass Conversion Audit (corrected four-route version)
    - name: Run Mass Conversion Audit
      run: python mass_conversion_audit.py

    # 6. Upload diagnostic outputs
    - name: Archive Diagnostic Outputs
      uses: actions/upload-artifact@v4
      with:
        name: Chi_Math_Diagnostics
        path: diagnostic_outputs/
