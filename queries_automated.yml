# luft_queries_automated.yml
# Fully automated query suite for LUFT Portal Engine
# Version: 1.1 - March 2026
# Author: Carl Dean Cline Sr. (with Grok assistance)

global:
  base_path: ./data/
  scripts_dir: ./scripts/
  output_dir: ./results/
  log_file: ./logs/engine_runs.log
  default_chi_limit: 0.15
  alert_on_violation: true
  auto_run_interval_hours: 1   # for scheduled Actions

queries:
  - id: boundary_validation
    title: "Latest DSCOVR χ Boundary Check (Last 24h)"
    description: "Compute max χ and violations in recent solar wind data"
    script: chi_validator.py
    auto_run: true
    schedule: hourly
    params:
      data_source: dscovr_solar_wind_audit.json
      window_hours: 24
      chi_threshold: "{{global.default_chi_limit}}"
      fallback_data: chi_at_boundary_timeseries.csv
    expected:
      max_chi: "<= 0.1500"
      violations: 0
      cluster_percentage_near_threshold: ">= 50%"
    outputs:
      - type: csv
        path: "{{global.output_dir}}/chi_boundary_latest.csv"
      - type: chart
        path: "{{global.output_dir}}/chi_timeseries_latest.png"
        format: png
      - type: alert
        condition: "violations > 0"
        message: "χ VIOLATION DETECTED! Max χ = {max_chi}"

  - id: gravity_derivation
    title: "Gravity-Matter Lock Validation"
    description: "Derive G from χ and compare to CODATA"
    script: gravity_math.py   # or inline sympy in chi_validator if preferred
    auto_run: true
    dependencies: [boundary_validation]   # needs fresh χ
    params:
      chi_value: "{{boundary_validation.outputs.max_chi}}"  # dynamic from prev
      scale_factor: 1e11
      codata_g: 6.67430e-11
    expected:
      derived_g: "6.6666e-11 ± 0.0001e-11"
      error_percent: "<= 0.12"
    outputs:
      - type: report
        path: "{{global.output_dir}}/g_derivation.txt"
      - type: chart
        path: "{{global.output_dir}}/g_vs_chi_comparison.png"

  - id: mass_ratio_lock
    title: "Electron-Proton Mass Ratio Geometric Lock"
    description: "Calculate (m_e/m_p)^{1/4} and match to χ"
    script: mass_ratio_lock.py
    auto_run: true
    params:
      m_e: 9.1093837015e-31
      m_p: 1.67262192369e-27
      chi_target: "{{global.default_chi_limit}}"
    expected:
      calculated_ratio: "≈0.152774"
      error_percent: "<= 2.0"
    outputs:
      - type: json
        path: "{{global.output_dir}}/mass_lock.json"
      - type: alert
        condition: "abs(calculated_ratio - chi_target) > 0.005"
        message: "Mass-ratio lock deviation > 0.5%!"

  - id: recoil_scan
    title: "Momentum Recoil Event Scan (USGS 2025-2026)"
    description: "Flag high-confidence delta-v / density drop events"
    script: momentum_recoil_detector.py
    auto_run: true
    params:
      data_source: usgs_magnetometer_summary.csv
      chi_min: 0.145
      confidence_threshold: 0.90
    expected:
      flagged_events: ">= 0"
      avg_chi_at_events: "~0.15"
    outputs:
      - type: csv
        path: "{{global.output_dir}}/recoil_events_latest.csv"

  - id: wake_analysis
    title: "MAVEN Magnetic Wake & Alfvén Wave Correlation"
    description: "Detect rotations/waves near χ boundary"
    script: magnetic_wake_analyzer.py
    auto_run: false   # manual trigger or daily
    dependencies: [boundary_validation, recoil_scan]
    params:
      data_source: maven_chi_analysis.csv
      chi_window: [0.145, 0.155]
    expected:
      wave_detections: ">= 5 per 100k points"
      correlation_strength: "> 0.75"
    outputs:
      - type: plot
        path: "{{global.output_dir}}/maven_wake_waves.png"

  - id: integrity_frequency
    title: "20.55 Hz Vacuum Integrity Frequency Check"
    description: "Compute χ/α and validate against storm resonance data"
    script: integrity_freq.py
    auto_run: true
    params:
      chi: "{{global.default_chi_limit}}"
      alpha: 0.0072973525693
      storm_data: goes_xray_flux.csv   # or your HDSDR .wav metadata
    expected:
      computed_freq: "≈20.55 Hz"
      resonance_match: "within ±0.5 Hz"
    outputs:
      - type: txt
        path: "{{global.output_dir}}/integrity_freq_validation.txt"

  - id: full_cross_correlation
    title: "Cline-Pack High-Confidence Event Cross-Link"
    description: "Correlate all pipelines for strongest events"
    script: cline_pack_correlation.py
    auto_run: daily
    dependencies: [boundary_validation, recoil_scan, wake_analysis]
    params:
      sources:
        - chi_at_boundary_timeseries.csv
        - momentum_recoil_events.csv
        - maven_chi_analysis.csv
      min_confidence: 0.92
    expected:
      high_conf_events: ">= 3"
    outputs:
      - type: md
        path: "{{global.output_dir}}/cline_pack_summary.md"
      - type: alert
        condition: "high_conf_events < 1"
        message: "Low event confidence — check ingest pipelines!"
